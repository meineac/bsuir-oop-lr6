spring:
  application:
    name: forecast
  config:
    import:
      - optional:file:.env[.properties]
      - classpath:cities.yaml

server:
  port: 8080

springdoc:
  api-docs:
    path: /swagger.json
  swagger-ui:
    path: /swagger

app:
  openweather:
    base-url: ${OPENWEATHER_BASE_URL}
    api-key: ${OPENWEATHER_API_KEY}
  googleweather:
    base-url: ${GOOGLEWEATHER_BASE_URL}
    api-key: ${GOOGLEWEATHER_API_KEY}
